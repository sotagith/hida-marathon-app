<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛騨高山ウルトラ攻略</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00e676;
            --text: #ffffff;
            --sub-text: #b0b0b0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }
        .distance-main {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }
        .label {
            font-size: 0.9rem;
            color: var(--sub-text);
            text-transform: uppercase;
        }
        .aid-info {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .message-box {
            font-style: italic;
            color: #ffeb3b;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status {
            font-size: 0.8rem;
            color: #666;
            margin-top: 20px;
        }
        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }

    /* 横並び用のコンテナ */
    .horizontal-group {
        display: flex;
        gap: 10px; /* カード間の隙間 */
        width: 100%;
        margin-bottom: 10px;
    }

    /* 横並び時のカード（幅を半分にする） */
    .half-card {
        flex: 1; /* 均等に幅を取る */
        padding: 15px 10px !important; /* 余白を少し削る */
    }

    /* 横並び用の少し小さめの数値サイズ */
    .distance-sub {
        font-size: 2.5rem; /* 元の3.5remより小さくして収まりを良くする */
        font-weight: bold;
        color: var(--accent);
        margin: 5px 0;
    }

    .distance-sub span {
        font-size: 1rem;
    }

    /* 現在の地点の色を分ける場合 */
    #dist-current {
        color: #64b5f6;
    }


    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align: center;">Hida Takayama Ultra</h3>

    <!-- 横並びにするグループ -->
    <div class="horizontal-group">
        <!-- 現在の地点 -->
        <div class="card half-card">
            <div class="label">現在の地点</div>
            <div class="distance-sub" id="dist-current">--.- <span>km</span></div>
        </div>

        <!-- Finishまで -->
        <div class="card half-card">
            <div class="label">Finishまで</div>
            <div class="distance-sub" id="dist-goal">--.- <span>km</span></div>
        </div>
    </div>

    <!-- 次のエイド情報 -->
    <div class="card">
        <div class="aid-info">
            <span id="next-aid-name">次のエイドを取得中...</span>
            <span id="dist-aid" style="font-weight: bold; color: var(--accent);">--.- km</span>
        </div>
        <div class="label" style="text-align: left;">提供予定:</div>
        <div id="aid-menu" style="text-align: left; margin-bottom: 10px;">---</div>
    </div>

    <!-- 必要ペース・アップダウン -->
    <div class="card">
        <div style="display: flex; justify-content: space-around;">
            <div>
                <div class="label">目標ペース</div>
                <div id="req-pace" style="font-size: 1.5rem;">--:--</div>
            </div>
            <div>
                <div class="label">標高状況</div>
                <div id="slope-info" style="font-size: 1.2rem;">計測中</div>
            </div>
        </div>
    </div>

    <!-- 応援メッセージ -->
    <div class="card message-box" id="cheer-msg">
        GPSを許可して開始してください
    </div>

    <button onclick="startTracking()">計測開始 / 更新</button>
    <div class="status" id="status">Status: Waiting</div>
</div>

<!-- テスト用：一時的に追加 -->
<div style="margin-top:20px; border:1px dashed #666; padding:10px;">
    <p>テスト機能</p>
    <button onclick="simulateMove(10)">+10km進む</button>
    <button onclick="simulateMove(1)">+1km進む</button>
    <button onclick="simulateMove(-1)">-1km戻る</button>
    <button onclick="simulateMove(-10)">-10km戻る</button>
</div>

<script>

    // --- 設定：公開したスプレッドシートのCSV URLをここに貼り付けてください ---
    const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHCFDsNJR_W-MMEOkt0o6Vb0YIdC_1iqpZmuxTIx5SHn2wmKG8HJx2dUcpzrY4zurIfrRisa19uMqS/pub?output=csv";

    let COURSE_DATA = { goal_km: 100, aids: [] };

    // ページ読み込み時にCSVを取得して解析する
    window.onload = async () => {
        try {
            const response = await fetch(SPREADSHEET_CSV_URL);
            const csvText = await response.text();
            parseCSV(csvText);
            document.getElementById('status').innerText = "Status: コースデータ読み込み完了";
        } catch (error) {
            document.getElementById('status').innerText = "Status: データ取得失敗";
            console.error(error);
        }
    };

    // CSVテキストをJSON構造に変換する関数
    function parseCSV(text) {
        const lines = text.split('\n');
        // 1行目はヘッダーなので i=1 から開始
        for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split(',');
            if (row.length < 7) continue; // 不完全な行をスキップ

            const aid = {
                name: row[1],
                km: parseFloat(row[2]),      // 100km用の距離
                km_71: parseFloat(row[3]),   // 71km用の距離
                menu: row[4].replace(/"/g, ''), // 引用符を削除
                lat: parseFloat(row[5]),
                lng: parseFloat(row[6])
            };
            COURSE_DATA.aids.push(aid);
        }
        // 最後にゴール距離を確定（リストの最後のkm）
        COURSE_DATA.goal_km = COURSE_DATA.aids[COURSE_DATA.aids.length - 1].km;
    }

    function startTracking() {
        if (!COURSE_DATA) {
            alert("コースデータがまだ読み込まれていません");
            return;
        }
        
        if (!navigator.geolocation) {
            alert("お使いのブラウザはGPSに対応していません");
            return;
        }

        document.getElementById('status').innerText = "Status: 追跡中...";
        navigator.geolocation.watchPosition(updatePosition, handleError, {
            enableHighAccuracy: true,
            timeout: 10000
        });
    }

let testKm = 0;
function simulateMove(step) {
    testKm += step;
    // updatePositionと同じ処理を、固定のtestKmで実行するように関数を呼ぶ
    updateDisplayForTest(testKm);
}

function updateDisplayForTest(currentKm) {


    // 2. 画面表示の更新
    // 現在の距離
    document.getElementById('dist-current').innerHTML = `${currentKm.toFixed(1)} <span style="font-size: 1.5rem;">km</span>`;
    
    // ゴールまでの残り
    let remainGoal = COURSE_DATA.goal_km - currentKm;
    document.getElementById('dist-goal').innerHTML = `${remainGoal.toFixed(1)} <span style="font-size: 1.5rem;">km</span>`;

    // 3. 次のエイドを探す
    let nextAid = COURSE_DATA.aids.find(aid => aid.km > currentKm);
    if (nextAid) {
        document.getElementById('next-aid-name').innerText = nextAid.name;
        document.getElementById('dist-aid').innerText = `${(nextAid.km - currentKm).toFixed(1)} km`;
        document.getElementById('aid-menu').innerText = nextAid.menu;
    }

    updateMessage(currentKm);
}


    function updatePosition(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        // 1. 現在の走行距離を計算
        // 本来は全コースの座標データが必要ですが、簡易版として「最も近いエイド」から推計
       // let currentKm = calculateCurrentKm(lat, lng); 
        let currentKm = estimateCurrentKm(lat, lng);

        // 2. 画面表示の更新
        // 現在の距離
        document.getElementById('dist-current').innerHTML = `${currentKm.toFixed(1)} <span style="font-size: 1.5rem;">km</span>`;
        
        // ゴールまでの残り
        let remainGoal = COURSE_DATA.goal_km - currentKm;
        document.getElementById('dist-goal').innerHTML = `${remainGoal.toFixed(1)} <span style="font-size: 1.5rem;">km</span>`;

        // 3. 次のエイドを探す
        let nextAid = COURSE_DATA.aids.find(aid => aid.km > currentKm);
        if (nextAid) {
            document.getElementById('next-aid-name').innerText = nextAid.name;
            document.getElementById('dist-aid').innerText = `${(nextAid.km - currentKm).toFixed(1)} km`;
            document.getElementById('aid-menu').innerText = nextAid.menu;
        }

        updateMessage(currentKm);
    }

    // 緯度経度からコース上の距離(km)を推計する関数
    function calculateCurrentKm(lat, lng) {
        if (!COURSE_DATA || COURSE_DATA.aids.length === 0) return 0;

        // 最も近いエイドを探す（簡易ロジック）
        let minDest = Infinity;
        let closestAidKm = 0;

        COURSE_DATA.aids.forEach(aid => {
            const d = Math.sqrt(Math.pow(lat - aid.lat, 2) + Math.pow(lng - aid.lng, 2));
            if (d < minDest) {
                minDest = d;
                closestAidKm = aid.km;
            }
        });

        return closestAidKm;
    }

    function estimateCurrentKm(lat, lng) {
        // 本番ではここで「コース全座標データ」と「現在地」を照合
        // 今回はサンプルとして、適当な数値を返します
        return 68.5; 
    }

    function updateMessage(km) {
        let msg = "";
        if (km < 20) msg = "序盤です。美女峠に備えて温存しましょう！";
        else if (km >= 70 && km < 75) msg = "千光寺の激坂！ここを越えれば飛騨牛が待っています！";
        else if (km >= 90) msg = "あと10km！高山の街へ帰りましょう！";
        else msg = "一歩一歩。完走はあなたのものです。";
        document.getElementById('cheer-msg').innerText = msg;
    }

    function handleError(error) {
        document.getElementById('status').innerText = "Status: GPSエラー";
        console.error(error);
    }
</script>

</body>
</html>
